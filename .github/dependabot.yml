version: 2
updates:
  # GitHub Actions used by the CI, Pages, and Release workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  # npm dev tooling for the VS Code extension (@vscode/vsce).
  # The root package.json only holds `npm run` shims with no dependencies,
  # so it is intentionally not tracked.
  - package-ecosystem: npm
    directory: /vscode
    schedule:
      interval: weekly
    groups:
      vscode-npm:
        patterns:
          - "*"

  # Python tooling that builds the documentation site (requirements-docs.txt).
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      docs-pip:
        patterns:
          - "*"
