name: Release VSIX

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to validate against vscode/package.json, e.g. v0.1.0"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    # windows-latest (unlike covdbg's ubuntu): the extension bundles a native
    # win32-x64 adapter that must be built here before packaging.
    runs-on: windows-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      # Same vcpkg wiring as ci.yml so the Release build reuses the binary cache.
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg-root-placeholder
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      # Hosted runners cannot do live cross-process attach; skip those replay tests.
      DAP_DBGENG_SKIP_LIVE_ATTACH: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Point VCPKG_ROOT at the preinstalled vcpkg
        shell: pwsh
        run: 'echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV'

      - name: Enable vcpkg binary caching
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        env:
          INPUT_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          $tag = if ($env:INPUT_TAG) { $env:INPUT_TAG } else { $env:GITHUB_REF_NAME }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "value=$tag"

      - name: Verify tag matches the extension version
        shell: pwsh
        run: pwsh scripts/Verify-ReleaseVersion.ps1 -Tag "${{ steps.release_tag.outputs.value }}"

      - name: Configure (Release)
        shell: pwsh
        run: npm run configure:release

      - name: Build adapter (Release)
        shell: pwsh
        run: npm run build:release

      - name: Test (Release)
        shell: pwsh
        run: npm run test:release

      - name: Bundle the adapter into the extension
        shell: pwsh
        run: npm run bundle:adapter

      - name: Install extension dependencies
        shell: pwsh
        working-directory: vscode
        run: npm ci

      - name: Package VSIX (win32-x64)
        shell: pwsh
        working-directory: vscode
        run: >
          npx @vscode/vsce package --target win32-x64
          --out "${{ github.workspace }}/dap-dbgeng-win32-x64-${{ steps.release_tag.outputs.value }}.vsix"

      - name: Publish to the VS Code Marketplace
        shell: pwsh
        working-directory: vscode
        run: |
          if (-not $env:VSCE_PAT) {
            Write-Error "VSCE_PAT secret is not configured. Add an Azure DevOps PAT with Marketplace (Manage) scope as the VSCE_PAT GitHub Actions secret."
            exit 1
          }
          $vsix = Get-ChildItem -Path "${{ github.workspace }}" -Filter "*.vsix" | Select-Object -First 1
          if (-not $vsix) {
            Write-Error "No VSIX was produced by the packaging step."
            exit 1
          }
          npx @vscode/vsce publish --packagePath $vsix.FullName -p $env:VSCE_PAT

      - name: Generate SHA256 checksum
        shell: pwsh
        run: |
          Get-ChildItem -Path "${{ github.workspace }}" -Filter "*.vsix" | ForEach-Object {
            "{0}  {1}" -f (Get-FileHash $_.FullName -Algorithm SHA256).Hash, $_.Name
          } | Set-Content -Path SHA256SUMS.txt
          Get-Content SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          generate_release_notes: true
          files: |
            *.vsix
            SHA256SUMS.txt
